# Site settings
title: "Pratyusha Sarkar"
description: "Portfolio and personal website of Pratyusha Sarkar."
url: "https://pratyushastat24.github.io"   # no trailing slash
baseurl: ""                                # keep empty for user site

# Author settings
author:
  name: "Pratyusha Sarkar"
  email: "pratyus1@umbc.edu"

# Footer settings (al-folio will use these)
footer:
  copyright: "© Copyright 2026 Pratyusha Sarkar."
  powered_by: "Powered by Jekyll with al-folio theme."

# Theme settings
remote_theme: "alshedivat/al-folio"

# Build settings
markdown: kramdown
highlighter: rouge

# Collections used by al-folio
collections:
  news:
    output: true
  projects:
    output: true

# Plugins often used with al-folio
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
